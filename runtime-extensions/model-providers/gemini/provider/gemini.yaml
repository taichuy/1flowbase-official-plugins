provider_code: gemini
display_name: Gemini
protocol: gemini
help_url: https://ai.google.dev/gemini-api/docs
default_base_url: https://generativelanguage.googleapis.com
model_discovery: hybrid
supports_model_fetch_without_credentials: false
parameter_form:
  schema_version: 1.0.0
  title: parameters.title
  description: parameters.description
  fields:
  - key: temperature
    label: parameters.temperature.label
    description: parameters.temperature.description
    type: number
    control: slider
    order: 10
    send_mode: optional
    enabled_by_default: false
    default_value: 0.7
    min: 0
    max: 2
    step: 0.1
  - key: top_p
    label: parameters.top_p.label
    description: parameters.top_p.description
    type: number
    control: slider
    order: 20
    send_mode: optional
    enabled_by_default: false
    default_value: 0.95
    min: 0
    max: 1
    step: 0.01
  - key: top_k
    label: parameters.top_k.label
    description: parameters.top_k.description
    type: integer
    control: number
    order: 30
    send_mode: optional
    enabled_by_default: false
    min: 1
    step: 1
  - key: max_tokens
    label: parameters.max_tokens.label
    description: parameters.max_tokens.description
    type: integer
    control: number
    order: 40
    send_mode: optional
    enabled_by_default: false
    min: 1
    step: 1
  - key: stop
    label: parameters.stop.label
    description: parameters.stop.description
    type: string
    control: textarea
    order: 50
    send_mode: optional
    enabled_by_default: false
    placeholder: parameters.stop.placeholder
  - key: response_format
    label: parameters.response_format.label
    description: parameters.response_format.description
    type: enum
    order: 60
    send_mode: optional
    enabled_by_default: false
    control: select
    options:
    - label: parameters.response_format.options.text.label
      value: text
    - label: parameters.response_format.options.json_object.label
      value: json_object
  - key: thinking_budget
    label: parameters.thinking_budget.label
    description: parameters.thinking_budget.description
    type: integer
    control: number
    order: 70
    send_mode: optional
    enabled_by_default: false
    step: 1
  - key: include_thoughts
    label: parameters.include_thoughts.label
    description: parameters.include_thoughts.description
    type: boolean
    control: toggle
    order: 80
    send_mode: always
    default_value: null
  - key: tool_choice
    label: parameters.tool_choice.label
    description: parameters.tool_choice.description
    type: enum
    order: 90
    send_mode: optional
    enabled_by_default: false
    control: select
    options:
    - label: parameters.tool_choice.options.none.label
      value: none
    - label: parameters.tool_choice.options.auto.label
      value: auto
    - label: parameters.tool_choice.options.required.label
      value: required

config_schema:
- key: base_url
  type: string
  required: true
  default: https://generativelanguage.googleapis.com
- key: api_key
  type: secret
  required: true
- key: proxy_url
  label: fields.proxy_url.label
  description: fields.proxy_url.description
  type: secret
  required: false
  advanced: true
- key: validate_model
  type: boolean
  required: false
  advanced: true
