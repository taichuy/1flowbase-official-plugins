provider_code: deepseek
display_name: DeepSeek
protocol: openai_compatible
help_url: https://api-docs.deepseek.com/zh-cn/api/deepseek-api
default_base_url: https://api.deepseek.com
model_discovery: hybrid
supports_model_fetch_without_credentials: false
parameter_form:
  schema_version: 1.0.0
  title: parameters.title
  description: parameters.description
  fields:
  - key: thinking_type
    label: parameters.thinking_type.label
    description: parameters.thinking_type.description
    type: enum
    order: 10
    send_mode: optional
    enabled_by_default: false
    control: select
    options:
    - label: parameters.thinking_type.options.enabled.label
      value: enabled
    - label: parameters.thinking_type.options.disabled.label
      value: disabled
  - key: reasoning_effort
    label: parameters.reasoning_effort.label
    description: parameters.reasoning_effort.description
    type: enum
    order: 20
    send_mode: optional
    enabled_by_default: false
    control: select
    options:
    - label: parameters.reasoning_effort.options.high.label
      value: high
    - label: parameters.reasoning_effort.options.max.label
      value: max
  - key: temperature
    label: parameters.temperature.label
    description: parameters.temperature.description
    type: number
    control: slider
    order: 30
    send_mode: optional
    enabled_by_default: false
    default_value: 0.7
    min: 0
    max: 2
    step: 0.1
  - key: top_p
    label: parameters.top_p.label
    description: parameters.top_p.description
    type: number
    control: slider
    order: 40
    send_mode: optional
    enabled_by_default: false
    default_value: 1.0
    min: 0
    max: 1
    step: 0.01
  - key: max_tokens
    label: parameters.max_tokens.label
    description: parameters.max_tokens.description
    type: integer
    control: number
    order: 50
    send_mode: optional
    enabled_by_default: false
    min: 1
    step: 1
  - key: response_format
    label: parameters.response_format.label
    description: parameters.response_format.description
    type: enum
    order: 60
    send_mode: optional
    enabled_by_default: false
    control: select
    options:
    - label: parameters.response_format.options.text.label
      value: text
    - label: parameters.response_format.options.json_object.label
      value: json_object
  - key: stop
    label: parameters.stop.label
    description: parameters.stop.description
    type: string
    control: textarea
    order: 70
    send_mode: optional
    enabled_by_default: false
    placeholder: parameters.stop.placeholder
  - key: tool_choice
    label: parameters.tool_choice.label
    description: parameters.tool_choice.description
    type: enum
    order: 80
    send_mode: optional
    enabled_by_default: false
    control: select
    options:
    - label: parameters.tool_choice.options.none.label
      value: none
    - label: parameters.tool_choice.options.auto.label
      value: auto
    - label: parameters.tool_choice.options.required.label
      value: required
  - key: logprobs
    label: parameters.logprobs.label
    description: parameters.logprobs.description
    type: boolean
    control: toggle
    order: 90
    send_mode: optional
    enabled_by_default: false
  - key: top_logprobs
    label: parameters.top_logprobs.label
    description: parameters.top_logprobs.description
    type: integer
    control: number
    order: 100
    send_mode: optional
    enabled_by_default: false
    min: 0
    max: 20
    step: 1
  - key: user_id
    label: parameters.user_id.label
    description: parameters.user_id.description
    type: string
    control: text
    order: 110
    send_mode: optional
    enabled_by_default: false

config_schema:
- key: base_url
  type: string
  required: true
  default: https://api.deepseek.com
- key: api_key
  type: secret
  required: true
- key: validate_model
  type: boolean
  required: false
  advanced: true
