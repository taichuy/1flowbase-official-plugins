provider_code: openai_compatible
display_name: OpenAI-Compatible API Provider
protocol: openai_compatible
help_url: https://platform.openai.com/docs/api-reference
model_discovery: hybrid
supports_model_fetch_without_credentials: false
config_schema:
  - key: base_url
    type: string
    required: true
  - key: api_key
    type: secret
    required: true
  - key: organization
    type: string
    required: false
    advanced: true
  - key: project
    type: string
    required: false
    advanced: true
  - key: api_version
    type: string
    required: false
    advanced: true
  - key: default_headers
    type: string
    required: false
    advanced: true
  - key: validate_model
    type: boolean
    required: false
