provider_code: openai_compatible
display_name: OpenAI-Compatible API Provider
protocol: openai_compatible
help_url: https://platform.openai.com/docs/api-reference
model_discovery: hybrid
supports_model_fetch_without_credentials: false
parameter_form:
  schema_version: 1.0.0
  title: OpenAI-Compatible Parameters
  description: Provider-level request parameters supported by the OpenAI-compatible invocation bridge.
  fields:
    - key: temperature
      label: Temperature
      type: number
      send_mode: optional
      enabled_by_default: false
      default_value: 0.7
    - key: top_p
      label: Top P
      type: number
      send_mode: optional
      enabled_by_default: true
      default_value: 1.0
    - key: max_tokens
      label: Max Tokens
      type: integer
      send_mode: optional
      enabled_by_default: false
    - key: seed
      label: Seed
      type: integer
      send_mode: optional
      enabled_by_default: false
config_schema:
  - key: base_url
    type: string
    required: true
  - key: api_key
    type: secret
    required: true
  - key: organization
    type: string
    required: false
    advanced: true
  - key: project
    type: string
    required: false
    advanced: true
  - key: api_version
    type: string
    required: false
    advanced: true
  - key: default_headers
    type: string
    required: false
    advanced: true
  - key: validate_model
    type: boolean
    required: false
