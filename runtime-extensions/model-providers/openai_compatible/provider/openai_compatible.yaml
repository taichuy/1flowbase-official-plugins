provider_code: openai_compatible
display_name: OpenAI-Compatible API Provider
protocol: openai_compatible
help_url: https://platform.openai.com/docs/api-reference
model_discovery: hybrid
supports_model_fetch_without_credentials: false
parameter_form:
  schema_version: 1.0.0
  title: parameters.title
  description: parameters.description
  fields:
  - key: reasoning_effort
    label: parameters.reasoning_effort.label
    description: parameters.reasoning_effort.description
    type: enum
    order: 110
    send_mode: optional
    enabled_by_default: false
    control: select
    options:
    - label: none
      value: none
    - label: minimal
      value: minimal
    - label: low
      value: low
    - label: medium
      value: medium
    - label: high
      value: high
    - label: xhigh
      value: xhigh
  - key: temperature
    label: parameters.temperature.label
    description: parameters.temperature.description
    type: number
    control: slider
    order: 10
    send_mode: optional
    enabled_by_default: false
    default_value: 0.7
    min: 0
    max: 2
    step: 0.1
  - key: top_p
    label: parameters.top_p.label
    description: parameters.top_p.description
    type: number
    control: slider
    order: 20
    send_mode: optional
    enabled_by_default: false
    default_value: 1.0
    min: 0
    max: 1
    step: 0.01
  - key: n
    label: parameters.n.label
    description: parameters.n.description
    type: integer
    control: number
    order: 30
    send_mode: optional
    enabled_by_default: false
    default_value: 1
    min: 1
    step: 1
  - key: max_tokens
    label: parameters.max_tokens.label
    description: parameters.max_tokens.description
    type: integer
    control: number
    order: 40
    send_mode: optional
    enabled_by_default: false
    min: 1
    step: 1
  - key: max_completion_tokens
    label: parameters.max_completion_tokens.label
    description: parameters.max_completion_tokens.description
    type: integer
    control: number
    order: 50
    send_mode: optional
    enabled_by_default: false
    min: 1
    step: 1
  - key: presence_penalty
    label: parameters.presence_penalty.label
    description: parameters.presence_penalty.description
    type: number
    control: slider
    order: 60
    send_mode: optional
    enabled_by_default: false
    default_value: 0
    min: -2
    max: 2
    step: 0.1
  - key: frequency_penalty
    label: parameters.frequency_penalty.label
    description: parameters.frequency_penalty.description
    type: number
    control: slider
    order: 70
    send_mode: optional
    enabled_by_default: false
    default_value: 0
    min: -2
    max: 2
    step: 0.1
  - key: stop
    label: parameters.stop.label
    description: parameters.stop.description
    type: string
    control: textarea
    order: 80
    send_mode: optional
    enabled_by_default: false
    placeholder: parameters.stop.placeholder
  - key: logit_bias
    label: parameters.logit_bias.label
    description: parameters.logit_bias.description
    type: json
    control: json_editor
    order: 90
    send_mode: optional
    enabled_by_default: false
    default_value: {}
    placeholder: parameters.logit_bias.placeholder
  - key: logprobs
    label: parameters.logprobs.label
    description: parameters.logprobs.description
    type: boolean
    control: switch
    order: 100
    send_mode: optional
    enabled_by_default: false
    default_value: false
  - key: seed
    label: parameters.seed.label
    description: parameters.seed.description
    type: integer
    control: number
    order: 130
    send_mode: optional
    enabled_by_default: false
    step: 1
config_schema:
- key: base_url
  type: string
  required: true
- key: api_key
  type: secret
  required: true
- key: organization
  type: string
  required: false
  advanced: true
- key: project
  type: string
  required: false
  advanced: true
- key: api_version
  type: string
  required: false
  advanced: true
- key: default_headers
  type: string
  required: false
  advanced: true
- key: validate_model
  type: boolean
  required: false
