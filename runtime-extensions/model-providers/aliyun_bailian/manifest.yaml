manifest_version: 1
plugin_id: aliyun_bailian
version: 0.1.8
vendor: 1flowbase
display_name: Alibaba Cloud Bailian
description: Alibaba Cloud Bailian model provider runtime extension
icon: icon.svg
source_kind: official_registry
trust_level: verified_official
consumption_kind: runtime_extension
execution_mode: process_per_call
slot_codes:
  - model_provider
binding_targets:
  - workspace
selection_mode: assignment_then_select
minimum_host_version: 0.2.6
contract_version: 1flowbase.provider/v1
schema_version: 1flowbase.plugin.manifest/v1
permissions:
  network: outbound_only
  secrets: provider_instance_only
  storage: none
  mcp: none
  subprocess: deny
runtime:
  protocol: stdio_json
  entry: bin/aliyun_bailian-provider
  limits:
    timeout_ms: 30000
    memory_bytes: 268435456
node_contributions: []
