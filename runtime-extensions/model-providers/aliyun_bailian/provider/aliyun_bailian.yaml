provider_code: aliyun_bailian
display_name: Alibaba Cloud Bailian
protocol: aliyun_bailian
help_url: https://help.aliyun.com/zh/model-studio/
default_base_url: https://dashscope.aliyuncs.com
model_discovery: hybrid
supports_model_fetch_without_credentials: false
parameter_form:
  schema_version: 1.0.0
  title: parameters.title
  description: parameters.description
  fields:
  - key: api_protocol
    label: parameters.api_protocol.label
    description: parameters.api_protocol.description
    type: enum
    order: 5
    send_mode: optional
    enabled_by_default: true
    control: select
    default_value: openai_responses
    options:
    - label: parameters.api_protocol.options.openai_responses.label
      value: openai_responses
    - label: parameters.api_protocol.options.openai_chat.label
      value: openai_chat
    - label: parameters.api_protocol.options.anthropic_messages.label
      value: anthropic_messages
    - label: parameters.api_protocol.options.dashscope.label
      value: dashscope
  - key: reasoning_effort
    label: parameters.reasoning_effort.label
    description: parameters.reasoning_effort.description
    type: enum
    order: 10
    send_mode: optional
    enabled_by_default: false
    control: select
    options:
    - label: parameters.reasoning_effort.options.low.label
      value: low
    - label: parameters.reasoning_effort.options.medium.label
      value: medium
    - label: parameters.reasoning_effort.options.high.label
      value: high
  - key: enable_thinking
    label: parameters.enable_thinking.label
    description: parameters.enable_thinking.description
    type: boolean
    control: toggle
    order: 15
    send_mode: optional
    enabled_by_default: false
  - key: enable_search
    label: parameters.enable_search.label
    description: parameters.enable_search.description
    type: boolean
    control: toggle
    order: 16
    send_mode: optional
    enabled_by_default: false
  - key: temperature
    label: parameters.temperature.label
    description: parameters.temperature.description
    type: number
    control: slider
    order: 20
    send_mode: optional
    enabled_by_default: false
    default_value: 0.7
    min: 0
    max: 2
    step: 0.1
  - key: top_p
    label: parameters.top_p.label
    description: parameters.top_p.description
    type: number
    control: slider
    order: 30
    send_mode: optional
    enabled_by_default: false
    default_value: 1.0
    min: 0
    max: 1
    step: 0.01
  - key: max_tokens
    label: parameters.max_tokens.label
    description: parameters.max_tokens.description
    type: integer
    control: number
    order: 40
    send_mode: optional
    enabled_by_default: false
    min: 1
    step: 1
  - key: max_output_tokens
    label: parameters.max_output_tokens.label
    description: parameters.max_output_tokens.description
    type: integer
    control: number
    order: 45
    send_mode: optional
    enabled_by_default: false
    min: 1
    step: 1
  - key: response_format
    label: parameters.response_format.label
    description: parameters.response_format.description
    type: enum
    order: 50
    send_mode: optional
    enabled_by_default: false
    control: select
    options:
    - label: parameters.response_format.options.text.label
      value: text
    - label: parameters.response_format.options.json_object.label
      value: json_object
  - key: tool_choice
    label: parameters.tool_choice.label
    description: parameters.tool_choice.description
    type: enum
    order: 60
    send_mode: optional
    enabled_by_default: false
    control: select
    options:
    - label: parameters.tool_choice.options.auto.label
      value: auto
    - label: parameters.tool_choice.options.required.label
      value: required
    - label: parameters.tool_choice.options.none.label
      value: none

config_schema:
- key: base_url
  type: string
  required: false
- key: api_key
  type: secret
  required: true
- key: api_protocol
  type: string
  required: false
- key: validate_model
  type: boolean
  required: false
  advanced: true
