name: provider-release

on:
  push:
    branches:
      - main
    paths:
      - 'models/**/manifest.yaml'

permissions:
  contents: write

concurrency:
  group: provider-release-main
  cancel-in-progress: false

jobs:
  detect-release-providers:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_releases: ${{ steps.detect.outputs.has_releases }}
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect providers with version changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          matrix_json="$(node scripts/detect-version-releases.mjs "${{ github.event.before }}" "${{ github.sha }}")"
          release_count="$(node --input-type=module -e "const matrix = JSON.parse(process.argv[1]); process.stdout.write(String(matrix.include.length));" "${matrix_json}")"
          echo "matrix=${matrix_json}" >> "${GITHUB_OUTPUT}"
          if [ "${release_count}" -gt 0 ]; then
            echo "has_releases=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_releases=false" >> "${GITHUB_OUTPUT}"
          fi

  release-provider:
    needs: detect-release-providers
    if: needs.detect-release-providers.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-release-providers.outputs.matrix) }}
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout host repo
        uses: actions/checkout@v4
        with:
          repository: taichuy/1flowbase
          path: host

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Ensure release tag points at current commit
        env:
          TAG_NAME: ${{ matrix.release_tag }}
          TARGET_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags origin
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/${TAG_NAME}" | awk '{print $1}')"

          if [ -n "${remote_tag_sha}" ]; then
            if [ "${remote_tag_sha}" != "${TARGET_SHA}" ]; then
              echo "Release tag ${TAG_NAME} already exists on ${remote_tag_sha}, expected ${TARGET_SHA}." >&2
              exit 1
            fi

            exit 0
          fi

          git tag "${TAG_NAME}" "${TARGET_SHA}"
          git push origin "refs/tags/${TAG_NAME}"

      - name: Write signing key
        env:
          OFFICIAL_PLUGIN_SIGNING_KEY_PEM: ${{ secrets.OFFICIAL_PLUGIN_SIGNING_KEY_PEM }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${OFFICIAL_PLUGIN_SIGNING_KEY_PEM}" ]; then
            echo "OFFICIAL_PLUGIN_SIGNING_KEY_PEM secret is required." >&2
            exit 1
          fi

          printf '%s' "${OFFICIAL_PLUGIN_SIGNING_KEY_PEM}" > official-plugin-signing-key.pem

      - name: Build and package provider artifacts
        id: package
        env:
          OFFICIAL_PLUGIN_SIGNING_KEY_ID: ${{ secrets.OFFICIAL_PLUGIN_SIGNING_KEY_ID }}
          PLUGIN_DIR: ${{ matrix.plugin_dir }}
          PROVIDER_CODE: ${{ matrix.provider_code }}
          VERSION: ${{ matrix.version }}
          RELEASE_TAG: ${{ matrix.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${OFFICIAL_PLUGIN_SIGNING_KEY_ID}" ]; then
            echo "OFFICIAL_PLUGIN_SIGNING_KEY_ID secret is required." >&2
            exit 1
          fi

          rm -rf dist
          mkdir -p dist
          artifacts_json='[]'

          for target_spec in \
            "x86_64-unknown-linux-musl|linux|amd64|musl" \
            "aarch64-unknown-linux-musl|linux|arm64|musl"
          do
            IFS='|' read -r rust_target os arch libc <<<"${target_spec}"
            cross build --manifest-path "${PLUGIN_DIR}/Cargo.toml" --release --target "${rust_target}"

            binary_path="${PLUGIN_DIR}/target/${rust_target}/release/${PROVIDER_CODE}-provider"
            package_json="$(node host/scripts/node/plugin.js package "${PLUGIN_DIR}" --out dist --runtime-binary "${binary_path}" --target "${rust_target}" --signing-key-pem-file official-plugin-signing-key.pem --signing-key-id "${OFFICIAL_PLUGIN_SIGNING_KEY_ID}")"
            package_name="$(node --input-type=module -e "const data = JSON.parse(process.argv[1]); process.stdout.write(data.packageName);" "${package_json}")"
            checksum="$(node --input-type=module -e "const data = JSON.parse(process.argv[1]); process.stdout.write(data.checksum);" "${package_json}")"
            download_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${package_name}"

            artifacts_json="$(node --input-type=module -e "const current = JSON.parse(process.argv[1]); current.push({ os: process.argv[2], arch: process.argv[3], libc: process.argv[4], rust_target: process.argv[5], download_url: process.argv[6], checksum: \`sha256:${process.argv[7]}\`, signature_algorithm: 'ed25519', signing_key_id: process.env.OFFICIAL_PLUGIN_SIGNING_KEY_ID }); process.stdout.write(JSON.stringify(current));" "${artifacts_json}" "${os}" "${arch}" "${libc}" "${rust_target}" "${download_url}" "${checksum}")"
          done

          echo "artifacts_json=${artifacts_json}" >> "${GITHUB_OUTPUT}"

      - name: Build registry entry
        id: registry
        env:
          ARTIFACTS_JSON: ${{ steps.package.outputs.artifacts_json }}
          PLUGIN_DIR: ${{ matrix.plugin_dir }}
          PROVIDER_CODE: ${{ matrix.provider_code }}
          VERSION: ${{ matrix.version }}
        shell: bash
        run: |
          set -euo pipefail
          echo "entry_json<<EOF" >> "${GITHUB_OUTPUT}"
          node --input-type=module - <<'NODE' >> "${GITHUB_OUTPUT}"
          import fs from 'node:fs';
          import path from 'node:path';

          function readField(filePath, fieldName, fallback = '') {
            const content = fs.readFileSync(filePath, 'utf8');
            const escaped = fieldName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const match = content.match(new RegExp(`^${escaped}:\\s*(.+)$`, 'm'));
            return match ? match[1].trim() : fallback;
          }

          const pluginDir = process.env.PLUGIN_DIR;
          const providerCode = process.env.PROVIDER_CODE;
          const providerPath = path.join(pluginDir, 'provider', `${providerCode}.yaml`);

          const displayName = readField(providerPath, 'display_name', providerCode);
          const protocol = readField(providerPath, 'protocol', providerCode);
          const helpUrl = readField(providerPath, 'help_url', '');
          const modelDiscoveryMode = readField(providerPath, 'model_discovery', 'hybrid');

          console.log(
            JSON.stringify({
              plugin_id: `1flowbase.${providerCode}`,
              provider_code: providerCode,
              display_name: displayName,
              protocol,
              latest_version: process.env.VERSION,
              help_url: helpUrl || null,
              model_discovery_mode: modelDiscoveryMode,
              artifacts: JSON.parse(process.env.ARTIFACTS_JSON || '[]'),
            })
          );
          NODE
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ matrix.provider_code }} v${{ matrix.version }}
          files: dist/*.1flowbasepkg
          overwrite_files: true

      - name: Save registry entry artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p registry-entry
          cat <<'EOF' > "registry-entry/${{ matrix.provider_code }}.json"
          ${{ steps.registry.outputs.entry_json }}
          EOF

      - name: Upload registry entry artifact
        uses: actions/upload-artifact@v4
        with:
          name: registry-entry-${{ matrix.provider_code }}
          path: registry-entry/${{ matrix.provider_code }}.json
          if-no-files-found: error

  update-official-registry:
    needs:
      - detect-release-providers
      - release-provider
    if: needs.detect-release-providers.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download registry entry artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: registry-entry-*
          merge-multiple: true
          path: registry-entries

      - name: Update official registry on default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${DEFAULT_BRANCH}"
          git switch --create registry-update "origin/${DEFAULT_BRANCH}"
          shopt -s nullglob
          entry_files=(registry-entries/*.json)

          if [ "${#entry_files[@]}" -eq 0 ]; then
            echo "No registry entry artifacts were produced." >&2
            exit 1
          fi

          for entry_file in "${entry_files[@]}"; do
            entry_json="$(tr -d '\n' < "${entry_file}")"
            node scripts/update-official-registry.mjs official-registry.json "${entry_json}"
          done

          if git diff --quiet -- official-registry.json; then
            echo "official-registry.json unchanged; skipping commit."
            exit 0
          fi

          git add official-registry.json
          git commit -m "chore: update official plugin registry for version changes"
          git push origin HEAD:"${DEFAULT_BRANCH}"
