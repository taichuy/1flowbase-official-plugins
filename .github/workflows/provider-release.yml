name: provider-release

on:
  push:
    branches:
      - main
    paths:
      - 'runtime-extensions/model-providers/**/manifest.yaml'
  workflow_dispatch:
    inputs:
      provider_code:
        description: Provider code under runtime-extensions/model-providers
        required: true
        type: string
      version:
        description: Optional release version override; defaults to manifest.yaml version
        required: false
        type: string
      allow_existing_tag_repair:
        description: Reuse an existing release tag to repair or backfill assets
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: provider-release-main
  cancel-in-progress: false

jobs:
  detect-release-providers:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      has_releases: ${{ steps.detect.outputs.has_releases }}
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect providers with version changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            provider_code="${{ inputs.provider_code }}"
            plugin_dir="runtime-extensions/model-providers/${provider_code}"
            if [ ! -f "${plugin_dir}/manifest.yaml" ]; then
              echo "Provider manifest not found: ${plugin_dir}/manifest.yaml" >&2
              exit 1
            fi

            version="${{ inputs.version }}"
            if [ -z "${version}" ]; then
              version="$(sed -n 's/^version:\s*//p' "${plugin_dir}/manifest.yaml" | head -n 1)"
            fi

            if [ -z "${version}" ]; then
              echo "Unable to resolve release version for ${provider_code}" >&2
              exit 1
            fi

            release_matrix_json="$(node --input-type=module -e 'process.stdout.write(JSON.stringify({ include: [{ plugin_dir: process.argv[1], provider_code: process.argv[2], release_tag: `${process.argv[2]}-v${process.argv[3]}`, version: process.argv[3] }] }));' "${plugin_dir}" "${provider_code}" "${version}")"
          else
            release_matrix_json="$(node scripts/detect-version-releases.mjs "${{ github.event.before }}" "${{ github.sha }}")"
          fi

          release_count="$(node --input-type=module -e "const matrix = JSON.parse(process.argv[1]); process.stdout.write(String(matrix.include.length));" "${release_matrix_json}")"
          package_matrix_json="$(node --input-type=module -e 'const releases = JSON.parse(process.argv[1]).include; const targets = [{ runs_on: "ubuntu-latest", rust_target: "x86_64-unknown-linux-musl", os: "linux", arch: "amd64", libc: "musl" }, { runs_on: "ubuntu-latest", rust_target: "aarch64-unknown-linux-musl", os: "linux", arch: "arm64", libc: "musl" }, { runs_on: "macos-latest", rust_target: "x86_64-apple-darwin", os: "darwin", arch: "amd64", libc: "" }, { runs_on: "macos-latest", rust_target: "aarch64-apple-darwin", os: "darwin", arch: "arm64", libc: "" }, { runs_on: "windows-latest", rust_target: "x86_64-pc-windows-msvc", os: "windows", arch: "amd64", libc: "msvc" }, { runs_on: "windows-latest", rust_target: "aarch64-pc-windows-msvc", os: "windows", arch: "arm64", libc: "msvc" }]; process.stdout.write(JSON.stringify({ include: releases.flatMap((release) => targets.map((target) => ({ ...release, ...target }))) }));' "${release_matrix_json}")"
          echo "matrix=${package_matrix_json}" >> "${GITHUB_OUTPUT}"
          if [ "${release_count}" -gt 0 ]; then
            echo "has_releases=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_releases=false" >> "${GITHUB_OUTPUT}"
          fi

  release-provider:
    needs: detect-release-providers
    if: needs.detect-release-providers.outputs.has_releases == 'true'
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-release-providers.outputs.matrix) }}
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout host repo
        uses: actions/checkout@v4
        with:
          repository: taichuy/1flowbase
          path: host

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install cross
        if: ${{ matrix.runs_on == 'ubuntu-latest' }}
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Validate signing configuration
        env:
          OFFICIAL_PLUGIN_SIGNING_KEY_PEM: ${{ secrets.OFFICIAL_PLUGIN_SIGNING_KEY_PEM || secrets.OFFICIAL_PLUGIN_SIGNING_PRIVATE_KEY_PEM }}
          OFFICIAL_PLUGIN_SIGNING_KEY_ID: ${{ secrets.OFFICIAL_PLUGIN_SIGNING_KEY_ID }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${OFFICIAL_PLUGIN_SIGNING_KEY_PEM}" ]; then
            echo "OFFICIAL_PLUGIN_SIGNING_KEY_PEM or OFFICIAL_PLUGIN_SIGNING_PRIVATE_KEY_PEM secret is required." >&2
            exit 1
          fi

          if [ -z "${OFFICIAL_PLUGIN_SIGNING_KEY_ID}" ]; then
            echo "OFFICIAL_PLUGIN_SIGNING_KEY_ID secret is required." >&2
            exit 1
          fi

          printf '%s' "${OFFICIAL_PLUGIN_SIGNING_KEY_PEM}" > official-plugin-signing-key.pem

      - name: Ensure release tag points at current commit
        env:
          TAG_NAME: ${{ matrix.release_tag }}
          TARGET_SHA: ${{ github.sha }}
          ALLOW_EXISTING_TAG_REPAIR: ${{ inputs.allow_existing_tag_repair }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags origin
          remote_tag_sha="$(git ls-remote --tags origin "refs/tags/${TAG_NAME}" | awk '{print $1}')"

          if [ -n "${remote_tag_sha}" ]; then
            if [ "${remote_tag_sha}" != "${TARGET_SHA}" ]; then
              if [ "${ALLOW_EXISTING_TAG_REPAIR}" = "true" ]; then
                echo "Release tag ${TAG_NAME} already exists on ${remote_tag_sha}; continuing because allow_existing_tag_repair=true."
                exit 0
              fi

              echo "Release tag ${TAG_NAME} already exists on ${remote_tag_sha}, expected ${TARGET_SHA}." >&2
              exit 1
            fi

            exit 0
          fi

          git tag "${TAG_NAME}" "${TARGET_SHA}"
          git push origin "refs/tags/${TAG_NAME}"

      - name: Build and package provider artifacts
        env:
          OFFICIAL_PLUGIN_SIGNING_KEY_ID: ${{ secrets.OFFICIAL_PLUGIN_SIGNING_KEY_ID }}
          PLUGIN_DIR: ${{ matrix.plugin_dir }}
          PROVIDER_CODE: ${{ matrix.provider_code }}
          VERSION: ${{ matrix.version }}
          RELEASE_TAG: ${{ matrix.release_tag }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist artifact-metadata
          mkdir -p dist artifact-metadata

          if [ "${{ matrix.runs_on }}" = "ubuntu-latest" ]; then
            cross build --manifest-path "${PLUGIN_DIR}/Cargo.toml" --release --target "${{ matrix.rust_target }}"
          else
            cargo build --manifest-path "${PLUGIN_DIR}/Cargo.toml" --release --target "${{ matrix.rust_target }}"
          fi

          runtime_binary_name="$(node scripts/list-provider-package-targets.mjs --plugin-dir "${PLUGIN_DIR}" --rust-target "${{ matrix.rust_target }}" --field runtime_binary_name)"
          binary_path="${PLUGIN_DIR}/target/${{ matrix.rust_target }}/release/${runtime_binary_name}"
          package_output="$(node host/scripts/node/plugin.js package "${PLUGIN_DIR}" --out dist --runtime-binary "${binary_path}" --target "${{ matrix.rust_target }}" --signing-key-pem-file official-plugin-signing-key.pem --signing-key-id "${OFFICIAL_PLUGIN_SIGNING_KEY_ID}")"
          package_file="$(printf '%s\n' "${package_output}" | sed -n 's/.*Plugin package created at //p' | tail -n 1)"
          if [ -z "${package_file}" ] || [ ! -f "${package_file}" ]; then
            echo "Failed to locate generated package file from plugin CLI output." >&2
            printf '%s\n' "${package_output}" >&2
            exit 1
          fi

          package_name="$(basename "${package_file}")"
          checksum="$(sha256sum "${package_file}" | awk '{print $1}')"
          download_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${package_name}"
          artifact_metadata_path="artifact-metadata/${PROVIDER_CODE}@${{ matrix.os }}-${{ matrix.arch }}.json"
          artifact_json="$(node --input-type=module -e 'process.stdout.write(JSON.stringify({ plugin_dir: process.argv[1], provider_code: process.argv[2], version: process.argv[3], release_tag: process.argv[4], artifact: { os: process.argv[5], arch: process.argv[6], checksum: "sha256:" + process.argv[7], libc: process.argv[8] || null, rust_target: process.argv[9], download_url: process.argv[10], signature_algorithm: "ed25519", signing_key_id: process.env.OFFICIAL_PLUGIN_SIGNING_KEY_ID } }, null, 2));' "${PLUGIN_DIR}" "${PROVIDER_CODE}" "${VERSION}" "${RELEASE_TAG}" "${{ matrix.os }}" "${{ matrix.arch }}" "${checksum}" "${{ matrix.libc }}" "${{ matrix.rust_target }}" "${download_url}")"
          printf '%s\n' "${artifact_json}" > "${artifact_metadata_path}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ matrix.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ matrix.provider_code }} v${{ matrix.version }}
          files: dist/*.1flowbasepkg
          overwrite_files: true

      - name: Upload artifact metadata
        uses: actions/upload-artifact@v4
        with:
          name: artifact-metadata-${{ matrix.provider_code }}-${{ matrix.os }}-${{ matrix.arch }}
          path: artifact-metadata/${{ matrix.provider_code }}@${{ matrix.os }}-${{ matrix.arch }}.json
          if-no-files-found: error

  update-official-registry:
    needs:
      - detect-release-providers
      - release-provider
    if: needs.detect-release-providers.outputs.has_releases == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download registry entry artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-metadata-*
          merge-multiple: true
          path: artifact-metadata

      - name: Update official registry on default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${DEFAULT_BRANCH}"
          git switch --create registry-update "origin/${DEFAULT_BRANCH}"
          shopt -s nullglob
          metadata_files=(artifact-metadata/*.json)

          if [ "${#metadata_files[@]}" -eq 0 ]; then
            echo "No artifact metadata files were produced." >&2
            exit 1
          fi

          node --input-type=module - <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          import { execFileSync } from 'node:child_process';

          const metadataDir = 'artifact-metadata';
          const grouped = new Map();

          for (const name of fs.readdirSync(metadataDir).filter((fileName) => fileName.endsWith('.json')).sort()) {
            const item = JSON.parse(fs.readFileSync(path.join(metadataDir, name), 'utf8'));
            const current = grouped.get(item.provider_code) ?? {
              pluginDir: item.plugin_dir,
              providerCode: item.provider_code,
              version: item.version,
              artifacts: [],
            };
            current.artifacts.push(item.artifact);
            grouped.set(item.provider_code, current);
          }

          for (const group of [...grouped.values()].sort((left, right) => left.providerCode.localeCompare(right.providerCode))) {
            const entryJson = execFileSync(
              'node',
              [
                'scripts/build-registry-entry.mjs',
                group.pluginDir,
                group.providerCode,
                group.version,
                JSON.stringify(group.artifacts),
              ],
              { encoding: 'utf8' }
            ).trim();
            execFileSync('node', ['scripts/update-official-registry.mjs', 'official-registry.json', entryJson], {
              stdio: 'inherit',
            });
          }
          NODE

          if git diff --quiet -- official-registry.json; then
            echo "official-registry.json unchanged; skipping commit."
            exit 0
          fi

          git add official-registry.json
          git commit -m "chore: update official plugin registry for version changes"
          git push origin HEAD:"${DEFAULT_BRANCH}"
