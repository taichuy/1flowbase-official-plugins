name: provider-release

on:
  push:
    tags:
      - '*-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout host repo
        uses: actions/checkout@v4
        with:
          repository: taichuy/1flowse
          path: host

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Parse release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          provider_code="${tag%-v*}"
          version="${tag##*-v}"
          plugin_dir="models/${provider_code}"

          if [ ! -d "${plugin_dir}" ]; then
            echo "Unknown provider directory: ${plugin_dir}" >&2
            exit 1
          fi

          grep -q "^version: ${version}$" "${plugin_dir}/manifest.yaml"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "provider_code=${provider_code}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "plugin_dir=${plugin_dir}" >> "${GITHUB_OUTPUT}"

      - name: Package provider artifact
        run: node host/scripts/node/plugin.js package ${{ steps.release.outputs.plugin_dir }} --out dist

      - name: Resolve package metadata
        id: package
        shell: bash
        run: |
          set -euo pipefail
          package_file="$(ls dist/*.1flowsepkg)"
          package_name="$(basename "${package_file}")"
          checksum="${package_name##*@}"
          checksum="${checksum%.1flowsepkg}"
          download_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${{ steps.release.outputs.tag }}/${package_name}"

          echo "package_file=${package_file}" >> "${GITHUB_OUTPUT}"
          echo "package_name=${package_name}" >> "${GITHUB_OUTPUT}"
          echo "checksum=${checksum}" >> "${GITHUB_OUTPUT}"
          echo "download_url=${download_url}" >> "${GITHUB_OUTPUT}"

      - name: Build registry entry
        id: registry
        env:
          PLUGIN_DIR: ${{ steps.release.outputs.plugin_dir }}
          PROVIDER_CODE: ${{ steps.release.outputs.provider_code }}
          VERSION: ${{ steps.release.outputs.version }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
          DOWNLOAD_URL: ${{ steps.package.outputs.download_url }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
        shell: bash
        run: |
          set -euo pipefail
          echo "entry_json<<EOF" >> "${GITHUB_OUTPUT}"
          node --input-type=module - <<'NODE' >> "${GITHUB_OUTPUT}"
          import fs from 'node:fs';
          import path from 'node:path';

          function readField(filePath, fieldName, fallback = '') {
            const content = fs.readFileSync(filePath, 'utf8');
            const escaped = fieldName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const match = content.match(new RegExp(`^${escaped}:\\s*(.+)$`, 'm'));
            return match ? match[1].trim() : fallback;
          }

          const pluginDir = process.env.PLUGIN_DIR;
          const providerCode = process.env.PROVIDER_CODE;
          const manifestPath = path.join(pluginDir, 'manifest.yaml');
          const providerPath = path.join(pluginDir, 'provider', `${providerCode}.yaml`);

          const displayName = readField(manifestPath, 'display_name', providerCode);
          const protocol = readField(providerPath, 'protocol', providerCode);
          const helpUrl = readField(providerPath, 'help_url', '');
          const modelDiscoveryMode = readField(providerPath, 'model_discovery', 'hybrid');

          console.log(
            JSON.stringify({
              plugin_id: `1flowse.${providerCode}`,
              provider_code: providerCode,
              display_name: displayName,
              protocol,
              latest_version: process.env.VERSION,
              release_tag: process.env.TAG_NAME,
              download_url: process.env.DOWNLOAD_URL,
              checksum: `sha256:${process.env.CHECKSUM}`,
              signature_status: 'unsigned',
              help_url: helpUrl || null,
              model_discovery_mode: modelDiscoveryMode,
            })
          );
          NODE
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: ${{ steps.package.outputs.package_file }}

      - name: Update official registry on default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          REGISTRY_ENTRY_JSON: ${{ steps.registry.outputs.entry_json }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${DEFAULT_BRANCH}"
          git switch --create registry-update "origin/${DEFAULT_BRANCH}"
          node scripts/update-official-registry.mjs official-registry.json "${REGISTRY_ENTRY_JSON}"

          if git diff --quiet -- official-registry.json; then
            echo "official-registry.json unchanged; skipping commit."
            exit 0
          fi

          git add official-registry.json
          git commit -m "chore: update official plugin registry for ${GITHUB_REF_NAME}"
          git push origin HEAD:"${DEFAULT_BRANCH}"
