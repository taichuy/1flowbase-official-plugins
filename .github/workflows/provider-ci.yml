name: provider-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  detect-package-targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Detect packaged providers
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          provider_matrix_json="$(node scripts/list-provider-package-targets.mjs --format github-matrix)"
          echo "matrix=${provider_matrix_json}" >> "${GITHUB_OUTPUT}"

  package-dry-run:
    needs: detect-package-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-package-targets.outputs.matrix) }}
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v4

      - name: Checkout host repo
        uses: actions/checkout@v4
        with:
          repository: taichuy/1flowbase
          path: host

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Validate official registry JSON
        run: node --input-type=module -e "JSON.parse(await import('node:fs').then((fs) => fs.readFileSync('official-registry.json', 'utf8')))"

      - name: Build provider binary for dry-run packaging
        shell: bash
        run: |
          set -euo pipefail
          plugin_dir="${{ matrix.plugin_dir }}"
          cargo_toml="${plugin_dir}/Cargo.toml"
          if [ ! -f "${cargo_toml}" ]; then
            echo "Skipping Rust dry-run build because ${cargo_toml} does not exist yet."
            exit 0
          fi

          cross build --manifest-path "${cargo_toml}" --release --target x86_64-unknown-linux-musl

      - name: Dry-run package provider
        shell: bash
        run: |
          set -euo pipefail
          plugin_dir="${{ matrix.plugin_dir }}"
          cargo_toml="${plugin_dir}/Cargo.toml"
          if [ ! -f "${cargo_toml}" ]; then
            echo "Skipping Rust dry-run package because ${cargo_toml} does not exist yet."
            exit 0
          fi
          binary_name="$(node scripts/list-provider-package-targets.mjs --plugin-dir "${plugin_dir}" --field binary_name)"

          node host/scripts/node/plugin.js package \
            "${plugin_dir}" \
            --out dist \
            --runtime-binary "${plugin_dir}/target/x86_64-unknown-linux-musl/release/${binary_name}" \
            --target x86_64-unknown-linux-musl

      - name: Test registry updater
        run: node --test scripts/_tests/*.test.mjs

      - name: Smoke-test reusable registry entry builder
        shell: bash
        run: |
          set -euo pipefail
          plugin_dir="${{ matrix.plugin_dir }}"
          version="$(sed -n 's/^version:\s*//p' "${plugin_dir}/manifest.yaml" | head -n 1)"
          node scripts/build-registry-entry.mjs "${plugin_dir}" "${{ matrix.provider_code }}" "${version}" '[]' > /dev/null
