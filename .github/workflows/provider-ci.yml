name: provider-ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      host_source_sha:
        description: Exact 1flowbase source SHA for package and conformance execution
        required: true
        type: string
      official_source_sha:
        description: Exact official-plugin source SHA for package and conformance execution
        required: true
        type: string

jobs:
  detect-package-targets:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.official_source_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Detect packaged providers
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          provider_matrix_json="$(node scripts/list-provider-package-targets.mjs --format github-matrix)"
          echo "matrix=${provider_matrix_json}" >> "${GITHUB_OUTPUT}"

  package-dry-run:
    needs: detect-package-targets
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-package-targets.outputs.matrix) }}
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.official_source_sha }}

      - name: Checkout exact host repo
        uses: actions/checkout@v6
        with:
          repository: taichuy/1flowbase
          ref: ${{ inputs.host_source_sha }}
          path: dist/conformance-host

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Sync provider manifest identity fields
        run: |
          node scripts/sync-provider-manifest-versions.mjs
          git diff --exit-code

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Validate official registry JSON
        run: node --input-type=module -e "JSON.parse(await import('node:fs').then((fs) => fs.readFileSync('official-registry.json', 'utf8')))"

      - name: Build provider binary for dry-run packaging
        shell: bash
        run: |
          set -euo pipefail
          plugin_dir="${{ matrix.plugin_dir }}"
          cargo_toml="${plugin_dir}/Cargo.toml"
          if [ ! -f "${cargo_toml}" ]; then
            echo "Skipping Rust dry-run build because ${cargo_toml} does not exist yet."
            exit 0
          fi

          cross build --manifest-path "${cargo_toml}" --release --target x86_64-unknown-linux-musl

      - name: Dry-run package provider
        shell: bash
        run: |
          set -euo pipefail
          plugin_dir="${{ matrix.plugin_dir }}"
          cargo_toml="${plugin_dir}/Cargo.toml"
          if [ ! -f "${cargo_toml}" ]; then
            echo "Skipping Rust dry-run package because ${cargo_toml} does not exist yet."
            exit 0
          fi
          binary_name="$(node scripts/list-provider-package-targets.mjs --plugin-dir "${plugin_dir}" --field binary_name)"

          node dist/conformance-host/scripts/node/plugin/cli.js package \
            "${plugin_dir}" \
            --out "tmp/provider-conformance/packages/${{ matrix.provider_code }}" \
            --runtime-binary "${plugin_dir}/target/x86_64-unknown-linux-musl/release/${binary_name}" \
            --target x86_64-unknown-linux-musl

      - name: Upload actual provider package
        uses: actions/upload-artifact@v7
        with:
          name: actual-provider-package-${{ matrix.provider_code }}
          path: tmp/provider-conformance/packages/${{ matrix.provider_code }}/*.1flowbasepkg
          if-no-files-found: error

      - name: Test registry updater
        run: |
          node --test \
            scripts/_tests/anthropic-provider-contract.test.mjs \
            scripts/_tests/build-registry-entry.test.mjs \
            scripts/_tests/detect-version-releases.test.mjs \
            scripts/_tests/deepseek-provider-contract.test.mjs \
            scripts/_tests/list-provider-package-targets.test.mjs \
            scripts/_tests/model-provider-proxy-config-contract.test.mjs \
            scripts/_tests/model-provider-static-model-contract.test.mjs \
            scripts/_tests/openai-compatible-parameter-contract.test.mjs \
            scripts/_tests/sort-provider-parameter-order.test.mjs \
            scripts/_tests/sync-main.test.mjs \
            scripts/_tests/sync-provider-manifest-versions.test.mjs \
            scripts/_tests/update-agent-flow-catalog.test.mjs \
            scripts/_tests/update-official-registry.test.mjs \
            scripts/_tests/workflow-config.test.mjs

      - name: Smoke-test reusable registry entry builder
        shell: bash
        run: |
          set -euo pipefail
          plugin_dir="${{ matrix.plugin_dir }}"
          version="$(sed -n 's/^version:\s*//p' "${plugin_dir}/manifest.yaml" | head -n 1)"
          node scripts/build-registry-entry.mjs "${plugin_dir}" "${{ matrix.provider_code }}" "${version}" '[]' > /dev/null

  actual-package-conformance:
    needs:
      - detect-package-targets
      - package-dry-run
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact official provider source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.official_source_sha }}

      - name: Checkout exact main source
        uses: actions/checkout@v6
        with:
          repository: taichuy/1flowbase
          ref: ${{ inputs.host_source_sha }}
          path: dist/conformance-host

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Download fixed actual-provider packages
        uses: actions/download-artifact@v8
        with:
          pattern: actual-provider-package-*
          merge-multiple: true
          path: ${{ runner.temp }}/provider-conformance/packages

      - name: Build exact plugin-runner host binary
        run: cargo build --manifest-path dist/conformance-host/api/Cargo.toml --release -p plugin-runner --bin plugin-runner

      - name: Run actual-package provider conformance
        run: |
          node dist/conformance-host/scripts/node/provider-conformance/cli.js \
            --main-root "$GITHUB_WORKSPACE/dist/conformance-host" \
            --official-root "$GITHUB_WORKSPACE" \
            --main-sha "${{ inputs.host_source_sha }}" \
            --official-sha "${{ inputs.official_source_sha }}" \
            --package-dir "$RUNNER_TEMP/provider-conformance/packages" \
            --plugin-runner-bin dist/conformance-host/api/target/release/plugin-runner \
            --fixture dist/conformance-host/scripts/node/provider-conformance/fixtures/six-provider-matrix.json \
            --artifact "$RUNNER_TEMP/provider-conformance/paired-sha.json"

      - name: Upload paired SHA artifact
        uses: actions/upload-artifact@v7
        with:
          name: provider-conformance-pair
          path: ${{ runner.temp }}/provider-conformance/paired-sha.json
          if-no-files-found: error
