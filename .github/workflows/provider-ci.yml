name: provider-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package-dry-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider:
          - openai_compatible
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v4

      - name: Checkout host repo
        uses: actions/checkout@v4
        with:
          repository: taichuy/1flowbase
          path: host

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Validate official registry JSON
        run: node --input-type=module -e "JSON.parse(await import('node:fs').then((fs) => fs.readFileSync('official-registry.json', 'utf8')))"

      - name: Build provider binary for dry-run packaging
        shell: bash
        run: |
          set -euo pipefail
          cargo_toml="models/${{ matrix.provider }}/Cargo.toml"
          if [ ! -f "${cargo_toml}" ]; then
            echo "Skipping Rust dry-run build because ${cargo_toml} does not exist yet."
            exit 0
          fi

          cross build --manifest-path "${cargo_toml}" --release --target x86_64-unknown-linux-musl

      - name: Dry-run package provider
        shell: bash
        run: |
          set -euo pipefail
          cargo_toml="models/${{ matrix.provider }}/Cargo.toml"
          if [ ! -f "${cargo_toml}" ]; then
            echo "Skipping Rust dry-run package because ${cargo_toml} does not exist yet."
            exit 0
          fi

          node host/scripts/node/plugin.js package \
            "models/${{ matrix.provider }}" \
            --out dist \
            --runtime-binary "models/${{ matrix.provider }}/target/x86_64-unknown-linux-musl/release/${{ matrix.provider }}-provider" \
            --target x86_64-unknown-linux-musl

      - name: Test registry updater
        run: node --test scripts/_tests/*.test.mjs
