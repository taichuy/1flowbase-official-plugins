name: provider-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  package-dry-run:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider:
          - openai_compatible
    steps:
      - name: Checkout official plugins repo
        uses: actions/checkout@v4

      - name: Checkout host repo
        uses: actions/checkout@v4
        with:
          repository: taichuy/1flowse
          path: host

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate official registry JSON
        run: node --input-type=module -e "JSON.parse(await import('node:fs').then((fs) => fs.readFileSync('official-registry.json', 'utf8')))"

      - name: Dry-run package provider
        run: node host/scripts/node/plugin.js package models/${{ matrix.provider }} --out dist

      - name: Test registry updater
        run: node --test scripts/_tests/update-official-registry.test.mjs
